name: Deploy

on:
  push:
    branches: [main]

jobs:
  ci:
    name: Lint, Build & Test
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to Oracle VM
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          port: 22
          script: |
            set -e

            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm use 22

            cd /home/ubuntu/tutien-bot

            git pull origin main

            npm ci

            npm run build

            source /etc/tutien/.env

            DATABASE_URL="$DATABASE_URL_DIRECT" npx drizzle-kit migrate

            pm2 restart tutien-bot

            echo "Waiting for bot to become healthy..."
            for i in $(seq 1 15); do
              sleep 3
              RESULT=$(curl -sf http://localhost:3000/health 2>/dev/null || true)
              if echo "$RESULT" | grep -q '"status":"ok"'; then
                echo "Health check passed on attempt $i"
                break
              fi
              echo "Attempt $i: not ready yet (${RESULT:-no response})"
              if [ "$i" -eq 15 ]; then
                echo "Health check failed after 45s — deploy may be broken!"
                exit 1
              fi
            done

            echo "Deploy complete."
